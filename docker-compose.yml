services:
  ojs:
    image: ghcr.io/raflyherdianto/ojs-app:latest
    container_name: ojs-app
    restart: unless-stopped
    volumes:
      - ojs-code:/var/www/html
      - ojs-files:/var/www/files
      - ./config.inc.php:/var/www/html/config.inc.php:ro
    networks:
      - shared-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1024M
        reservations:
          memory: 256M

  web:
    image: nginxinc/nginx-unprivileged:alpine
    container_name: ojs-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ojs-code:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shared-network
    depends_on:
      - ojs
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M

volumes:
  ojs-code:
    name: ojs-app-code
  ojs-files:
    name: ojs-app-files

networks:
  shared-network:
    external: true
